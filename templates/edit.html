<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Employee - {{ employee.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
    <h4 class = "mb-0">Edit Employee Details</h4>
                    </div>
    

    <body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0">Edit Employee Details</h4>
                    </div>
                    <div class="card-body">
                        <form action="/edit/{{ employee.emp_id }}" method="POST">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Employee Name</label>
                                <input type="text" name="name" class="form-control" value="{{ employee.name }}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Email Address</label>
                                <input type="email" name="email" class="form-control" value="{{ employee.email }}" required>
                            </div>

                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label fw-bold">Date of Birth</label>
                                    <input type="date" name="dob" class="form-control" value="{{ employee.dob }}" required>
                                </div>
                                <div class="col">
                                    <label class="form-label fw-bold">Department</label>
                                    <input type="text" name="department" class="form-control" value="{{ employee.department }}">
                                </div>
                            </div>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted">Date Joined</label>
                                    <input type="date" name="date_joined" class="form-control" value="{{ employee.date_joined }}">
                               </div>
                            
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted">Salary</label>
                                    <input type="number" name="salary" class="form-control" value="{{ employee.salary }}">
                                </div>
                            </div>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Gender</label>
                                        <select name="gender" class="form-select">
                                        <option value="Male" {% if employee.gender.value == 'Male' %}selected{% endif %}>Male</option>
                                        <option value="Female" {% if employee.gender.value == 'Female' %}selected{% endif %}>Female</option>
                                        <option value="Others" {% if employee.gender.value == 'Others' %}selected{% endif %}>Others</option>
                                        </select>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-4">
                                <button type="submit" class="btn btn-primary px-3">Update Employee</button>
                                <a href="/" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</body>
</html>
